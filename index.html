<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Improv">
<meta name="theme-color" content="#0a0a12">
<title>Improv Practice</title>
<style>
:root {
  --bg: #0a0a12;
  --card: #14141f;
  --card-border: #1e1e2e;
  --accent: #e94560;
  --accent-dim: #e9456033;
  --text: #e8e8ee;
  --muted: #6b6b80;
  --green: #4ade80;
  --blue: #60a5fa;
  --orange: #fb923c;
  --purple: #a78bfa;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  -webkit-user-select: none; user-select: none;
}
#app {
  height: 100%;
  display: flex;
  flex-direction: column;
  padding-top: var(--safe-top);
  padding-bottom: var(--safe-bottom);
}

/* Views */
.view { display: none; flex-direction: column; height: 100%; overflow: hidden; }
.view.active { display: flex; }

/* Header */
.header {
  display: flex;
  align-items: center;
  padding: 12px 16px;
  min-height: 52px;
  flex-shrink: 0;
}
.header h1 {
  font-size: 17px;
  font-weight: 600;
  flex: 1;
  text-align: center;
}
.back-btn, .star-btn {
  width: 44px;
  height: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: none;
  border: none;
  color: var(--accent);
  font-size: 20px;
  cursor: pointer;
  border-radius: 12px;
  flex-shrink: 0;
}
.back-btn:active, .star-btn:active { background: var(--accent-dim); }
.star-btn.favorited { color: #fbbf24; }
.header-spacer { width: 44px; flex-shrink: 0; }

/* Home View */
#view-home { padding: 0 20px; }
.home-title {
  text-align: center;
  padding: 40px 0 8px;
}
.home-title h1 {
  font-size: 28px;
  font-weight: 700;
  letter-spacing: -0.5px;
}
.home-title p {
  color: var(--muted);
  font-size: 14px;
  margin-top: 4px;
}
.home-actions {
  display: flex;
  flex-direction: column;
  gap: 12px;
  padding-top: 32px;
}
.home-btn {
  display: flex;
  align-items: center;
  gap: 16px;
  background: var(--card);
  border: 1px solid var(--card-border);
  border-radius: 16px;
  padding: 20px;
  color: var(--text);
  font-size: 17px;
  font-weight: 600;
  cursor: pointer;
  transition: transform 0.1s;
  text-align: left;
}
.home-btn:active { transform: scale(0.97); }
.home-btn .icon {
  width: 48px;
  height: 48px;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  flex-shrink: 0;
}
.home-btn .icon.red { background: var(--accent-dim); }
.home-btn .icon.gold { background: #fbbf2433; color: #fbbf24; }
.home-btn .icon.blue { background: #60a5fa33; }
.home-btn .label-group { flex: 1; }
.home-btn .sublabel {
  font-size: 13px;
  font-weight: 400;
  color: var(--muted);
  margin-top: 2px;
}
.home-footer {
  margin-top: auto;
  padding: 20px 0;
  text-align: center;
  color: var(--muted);
  font-size: 12px;
  font-style: italic;
  line-height: 1.5;
}

/* Exercise View */
#view-exercise {
  padding: 0 16px;
}
.exercise-scroll {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding-bottom: 20px;
}
.exercise-meta {
  display: flex;
  gap: 8px;
  margin-bottom: 12px;
  flex-wrap: wrap;
}
.badge {
  font-size: 11px;
  font-weight: 600;
  padding: 4px 10px;
  border-radius: 20px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.badge.source { background: #60a5fa22; color: var(--blue); }
.badge.category { background: #a78bfa22; color: var(--purple); }
.exercise-name {
  font-size: 26px;
  font-weight: 700;
  letter-spacing: -0.5px;
  margin-bottom: 16px;
  line-height: 1.2;
}
.exercise-instructions {
  font-size: 16px;
  line-height: 1.6;
  color: #c8c8d4;
  margin-bottom: 20px;
}
.exercise-purpose {
  font-size: 14px;
  line-height: 1.5;
  color: var(--muted);
  padding: 12px 16px;
  background: var(--card);
  border-radius: 12px;
  border-left: 3px solid var(--accent);
  margin-bottom: 20px;
}
.exercise-purpose strong { color: var(--text); }

/* Prompt Section */
.prompt-section {
  background: var(--card);
  border: 1px solid var(--card-border);
  border-radius: 16px;
  padding: 16px;
  margin-bottom: 20px;
}
.prompt-label {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--muted);
  margin-bottom: 8px;
}
.prompt-value {
  font-size: 22px;
  font-weight: 700;
  color: var(--orange);
  min-height: 34px;
  line-height: 1.3;
  margin-bottom: 12px;
}
.prompt-btn {
  background: var(--orange);
  color: #000;
  border: none;
  border-radius: 10px;
  padding: 10px 20px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  width: 100%;
}
.prompt-btn:active { opacity: 0.8; }

/* Timer Section */
.timer-section {
  text-align: center;
  margin-bottom: 20px;
}
.timer-display {
  font-size: 72px;
  font-weight: 200;
  font-variant-numeric: tabular-nums;
  letter-spacing: 2px;
  margin: 8px 0;
  color: var(--text);
  transition: color 0.3s;
}
.timer-display.running { color: var(--green); }
.timer-display.done { color: var(--accent); }
.timer-presets {
  display: flex;
  gap: 8px;
  justify-content: center;
  margin-bottom: 12px;
}
.preset-btn {
  background: var(--card);
  border: 1px solid var(--card-border);
  color: var(--text);
  border-radius: 10px;
  padding: 8px 14px;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  min-width: 48px;
}
.preset-btn:active, .preset-btn.selected {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
}
.timer-controls {
  display: flex;
  gap: 10px;
  justify-content: center;
}
.timer-btn {
  border: none;
  border-radius: 12px;
  padding: 12px 32px;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
}
.timer-btn.start { background: var(--green); color: #000; }
.timer-btn.stop { background: var(--accent); color: #fff; }
.timer-btn.reset { background: var(--card); border: 1px solid var(--card-border); color: var(--text); }
.timer-btn:active { opacity: 0.8; }

/* Continuous mode toggle */
.continuous-toggle {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  margin-top: 14px;
  padding: 10px 20px;
  background: none;
  border: 1px solid var(--card-border);
  border-radius: 10px;
  color: var(--muted);
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
}
.continuous-toggle.active {
  border-color: var(--green);
  color: var(--green);
  background: #4ade8015;
}
.cont-icon { font-size: 10px; letter-spacing: -3px; }

/* Bottom Action */
.bottom-action {
  padding: 12px 16px;
  flex-shrink: 0;
}
.next-btn {
  width: 100%;
  padding: 16px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 14px;
  font-size: 17px;
  font-weight: 600;
  cursor: pointer;
}
.next-btn:active { opacity: 0.85; }

/* Browse View */
#view-browse { padding: 0 16px; }
.browse-list {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding-bottom: 20px;
}
.browse-category {
  margin-bottom: 8px;
}
.browse-category-header {
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--muted);
  padding: 16px 0 8px;
}
.browse-item {
  display: flex;
  align-items: center;
  gap: 12px;
  background: var(--card);
  border: 1px solid var(--card-border);
  border-radius: 12px;
  padding: 14px 16px;
  margin-bottom: 6px;
  cursor: pointer;
  transition: transform 0.1s;
}
.browse-item:active { transform: scale(0.98); }
.browse-item .name {
  flex: 1;
  font-size: 16px;
  font-weight: 500;
}
.browse-item .source-tag {
  font-size: 10px;
  color: var(--muted);
}
.browse-item .fav-indicator {
  color: #fbbf24;
  font-size: 14px;
}

/* Animations */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
.animate-in { animation: fadeIn 0.2s ease-out; }

@keyframes promptPop {
  0% { transform: scale(0.9); opacity: 0.5; }
  100% { transform: scale(1); opacity: 1; }
}
.prompt-pop { animation: promptPop 0.15s ease-out; }

/* Empty state */
.empty-state {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px 20px;
  text-align: center;
  color: var(--muted);
}
.empty-state p { font-size: 17px; margin-bottom: 8px; }
.empty-hint { font-size: 14px; }
</style>
</head>
<body>
<div id="app">

  <!-- HOME -->
  <div id="view-home" class="view active">
    <div class="home-title">
      <h1>Improv Practice</h1>
      <p>63 exercises. No excuses.</p>
    </div>
    <div class="home-actions">
      <button class="home-btn" onclick="randomExercise()">
        <div class="icon red">&#9861;</div>
        <div class="label-group">
          Random Exercise
          <div class="sublabel">Just hit go</div>
        </div>
      </button>
      <button class="home-btn" onclick="showFavorites()">
        <div class="icon gold">&#9733;</div>
        <div class="label-group">
          Favorites
          <div class="sublabel" id="fav-count"></div>
        </div>
      </button>
      <button class="home-btn" onclick="showBrowse()">
        <div class="icon blue">&#9776;</div>
        <div class="label-group">
          Browse All
          <div class="sublabel" id="exercise-count">63 exercises</div>
        </div>
      </button>
    </div>
    <div class="home-footer">
      Your first thought is the right thought.<br>
      Hesitation is the censor winning.
    </div>
  </div>

  <!-- EXERCISE -->
  <div id="view-exercise" class="view">
    <div class="header">
      <button class="back-btn" onclick="goHome()">&#8249;</button>
      <h1 id="ex-header-title"></h1>
      <button class="star-btn" id="ex-star" onclick="toggleFavorite()">&#9734;</button>
    </div>
    <div class="exercise-scroll" id="exercise-scroll">
      <div class="exercise-meta">
        <span class="badge source" id="ex-source"></span>
        <span class="badge category" id="ex-category"></span>
      </div>
      <h2 class="exercise-name" id="ex-name"></h2>
      <div class="exercise-instructions" id="ex-instructions"></div>
      <div class="exercise-purpose" id="ex-purpose"></div>

      <div class="prompt-section" id="prompt-section" style="display:none">
        <div class="prompt-label" id="prompt-label">Prompt</div>
        <div class="prompt-value" id="prompt-value"></div>
        <button class="prompt-btn" onclick="newPrompt()">Next Prompt</button>
      </div>

      <div class="timer-section">
        <div class="timer-presets" id="timer-presets">
          <button class="preset-btn" onclick="setTimer(30)">0:30</button>
          <button class="preset-btn selected" onclick="setTimer(60)">1:00</button>
          <button class="preset-btn" onclick="setTimer(120)">2:00</button>
          <button class="preset-btn" onclick="setTimer(300)">5:00</button>
        </div>
        <div class="timer-display" id="timer-display">1:00</div>
        <div class="timer-controls">
          <button class="timer-btn reset" id="btn-reset" onclick="resetTimer()">Reset</button>
          <button class="timer-btn start" id="btn-start" onclick="toggleTimer()">Start</button>
        </div>
        <button class="continuous-toggle" id="btn-continuous" onclick="toggleContinuous()">
          <span class="cont-icon" id="cont-icon">&#9654;&#9654;</span>
          <span id="cont-label">Continuous</span>
        </button>
      </div>
    </div>
    <div class="bottom-action">
      <button class="next-btn" onclick="randomExercise()">Next Random Exercise</button>
    </div>
  </div>

  <!-- FAVORITES -->
  <div id="view-favorites" class="view">
    <div class="header">
      <button class="back-btn" onclick="goHome()">&#8249;</button>
      <h1>Favorites</h1>
      <div class="header-spacer"></div>
    </div>
    <div class="browse-list" id="favorites-list"></div>
    <div class="empty-state" id="favorites-empty" style="display:none">
      <p>No favorites yet.</p>
      <p class="empty-hint">Tap the star on any exercise to add it here.</p>
    </div>
  </div>

  <!-- BROWSE -->
  <div id="view-browse" class="view">
    <div class="header">
      <button class="back-btn" onclick="goHome()">&#8249;</button>
      <h1>All Exercises</h1>
      <div class="header-spacer"></div>
    </div>
    <div class="browse-list" id="browse-list"></div>
  </div>

</div>

<script>
// ── Exercise Data (63 total) ──────────────────────────────

const exercises = [

  // ═══════════════════════════════════════════════════════════
  // WARM-UPS
  // ═══════════════════════════════════════════════════════════

  {
    id: 'word-vomit',
    name: 'Word Vomit',
    category: 'Warm-up',
    source: 'Johnstone / Impro',
    instructions: 'Say one word out loud. Then the very first word that comes to mind. Then the next. Don\'t pause. Don\'t filter. Don\'t try to make sense or be clever. One word per second, as fast as possible. Speed is everything — the goal is to outrun the censor entirely. If you catch yourself thinking, go faster.',
    purpose: '<strong>The universal warm-up.</strong> Johnstone says hesitation = censoring. The brain constructs the entire universe — it\'s impossible to be "stuck" for a word.',
    duration: 120,
    prompts: ['words'],
    promptLabel: 'Starting Word',
    warmup: true,
    favorite: true
  },
  {
    id: 'new-choice',
    name: 'New Choice',
    category: 'Warm-up',
    source: 'Solo Practice',
    instructions: 'Do a mundane activity (making coffee, getting dressed). Narrate what you\'re doing out loud. Every 10 seconds, say "New choice!" and replace whatever you just said with something completely different. Then "New choice!" again. Three replacements per beat, then move on.',
    purpose: '<strong>Trains you to abandon ideas without grief.</strong> The censor\'s power comes from making you precious about your first idea. This teaches you there are infinite ideas.',
    duration: 180,
    prompts: [],
    warmup: true,
    favorite: false
  },
  {
    id: 'sound-and-movement',
    name: 'Sound and Movement',
    category: 'Warm-up',
    source: 'Solo Practice',
    instructions: 'Stand up. Make a sound — any sound. Let the sound create a movement in your body. Hold it for 5 seconds. Then let the movement transform into a new sound, which transforms into a new movement. Chain 10 of these together without stopping.',
    purpose: '<strong>Gets you out of your head and into your body.</strong> Johnstone\'s Mask work shows that the body leads and the mind follows — not the other way around.',
    duration: 120,
    prompts: [],
    warmup: true,
    favorite: false
  },
  {
    id: 'gibberish-monolog',
    name: 'Gibberish Monolog',
    category: 'Warm-up',
    source: 'Solo Practice',
    instructions: 'Pick an emotion (use the prompt). Deliver a passionate 90-second monolog in complete gibberish. Commit fully. Gesture. Pace. Whisper. Shout. No real words allowed.',
    purpose: '<strong>Strips away dependence on clever language.</strong> Forces you to commit to emotion and physicality, which is where truthful performance lives. Play it straight and the comedy handles itself.',
    duration: 90,
    prompts: ['emotions'],
    promptLabel: 'Your Emotion',
    warmup: true,
    favorite: false
  },

  // ═══════════════════════════════════════════════════════════
  // THINKING (Napier)
  // ═══════════════════════════════════════════════════════════

  {
    id: 'dada-monologue',
    name: 'Dada Monologue',
    category: 'Thinking',
    source: 'Napier / Improvise',
    instructions: 'Look at an object (or use the prompt) and start a monologue using that object\'s name. The key: try not to stay on any idea too long and make sense of nothing. Nonsensical, stream-of-consciousness talking. When you start to make sense, change it up.',
    purpose: '<strong>Frees up random associations.</strong> Jogs your mind awake. Brings light, fun, absurd thoughts to associate with while improvising.',
    duration: 120,
    prompts: ['words'],
    promptLabel: 'Starting Object',
    warmup: true,
    favorite: false
  },
  {
    id: 'word-association',
    name: 'Word Association',
    category: 'Thinking',
    source: 'Napier / Improvise',
    instructions: 'See an object, say its name out loud, and WITHOUT PAUSING immediately begin to talk about it. Describe it, tell a story, share an experience. After about ten seconds, interrupt yourself by saying a new object and WITHOUT PAUSING start talking about the new one. Do at least ten objects. Advanced: come up with words off the top of your head.',
    purpose: '<strong>Teaches you that you can literally talk about anything.</strong> The gap between the word and talking is where the censor lives.',
    duration: 120,
    prompts: ['words'],
    promptLabel: 'Starting Word',
    warmup: true,
    favorite: false
  },
  {
    id: 'gibberish-napier',
    name: 'Gibberish Scene',
    category: 'Thinking',
    source: 'Napier / Improvise',
    instructions: 'Speak in nonsensical, non-English babble. Once comfortable, choose a character with a particular point of view and speak a line of gibberish from that character\'s energy. Then respond in gibberish with a character who has very different energy. Now you\'re doing a gibberish scene.',
    purpose: '<strong>Eliminates the importance we place on words.</strong> In gibberish, your emotional life awakens. You practice putting the HOW into your improvisation — how someone says something versus what they say.',
    duration: 120,
    prompts: ['characters', 'emotions'],
    promptLabel: 'Character / Emotion',
    warmup: false,
    favorite: false
  },

  // ═══════════════════════════════════════════════════════════
  // KILLING THE CENSOR
  // ═══════════════════════════════════════════════════════════

  {
    id: 'expert-interview',
    name: 'Expert Interview',
    category: 'Killing the Censor',
    source: 'Solo Practice / Truth in Comedy',
    instructions: 'Pick a random topic (use the prompt). You are now the world\'s leading expert. Speak with total authority and zero hesitation for 2 minutes. No hedging. No "um." Start sentences before you know how they\'ll end. When 2 min feels easy, go to 5. Then start taking imaginary "audience questions" and answering without breaking character.',
    purpose: '<strong>Kills the censor</strong> — you can\'t know enough, so the censor becomes irrelevant. Trains commitment — every sentence requires doubling down on what you just invented.',
    duration: 120,
    prompts: ['expertTopics'],
    promptLabel: 'Your Expert Topic',
    warmup: false,
    favorite: false
  },
  {
    id: 'automatic-writing',
    name: 'Automatic Writing',
    category: 'Killing the Censor',
    source: 'Johnstone / Impro',
    instructions: 'Open a blank page (paper or screen). Set a timer for 3 minutes. Write without stopping. The pen never leaves the paper. If you don\'t know what to write, write "I don\'t know what to write" until something comes. Do not reread. Do not edit. Do not cross out.',
    purpose: '<strong>Trains the intellect to step aside.</strong> Schiller said "the intellect has withdrawn its watcher from the gates, and the ideas rush in pell-mell." If what you wrote doesn\'t surprise or slightly embarrass you, you were still censoring.',
    duration: 180,
    prompts: [],
    warmup: false,
    favorite: false
  },
  {
    id: 'first-thought-worst-thought',
    name: 'First Thought, Worst Thought',
    category: 'Killing the Censor',
    source: 'Johnstone / Impro',
    instructions: 'Pick a random object (or use the prompt). Say the first word it makes you think of. Then the first word THAT makes you think of. Chain 30 associations as fast as you can. Go with the first thing — especially if it seems stupid, psychotic, or obscene.',
    purpose: '<strong>Overrides the three filters that kill ideas.</strong> Johnstone: the three fears are that ideas are psychotic, obscene, or unoriginal. "The best ideas are often psychotic."',
    duration: 120,
    prompts: ['words'],
    promptLabel: 'Starting Object',
    warmup: false,
    favorite: true
  },

  // ═══════════════════════════════════════════════════════════
  // SPEED & SPECIFICITY
  // ═══════════════════════════════════════════════════════════

  {
    id: 'three-line-scenes',
    name: 'Three-Line Scenes',
    category: 'Speed & Specificity',
    source: 'Truth in Comedy',
    instructions: 'Play both characters. Line 1: establish who, where, or what\'s happening. Line 2: "yes, and" with new information. Line 3: find the game or heighten. Start a new scene immediately. Do 20 scenes in 10 minutes. Speed over perfection. Statements, not questions. Gifts, not requests.',
    purpose: '<strong>Scene compression.</strong> Del Close drilled these relentlessly. "Get in there, get it done." Tim Kazurinski compared it to nuns drilling times tables.',
    duration: 300,
    prompts: [],
    warmup: false,
    favorite: false
  },
  {
    id: 'specificity-swap',
    name: 'Specificity Swap',
    category: 'Speed & Specificity',
    source: 'Truth in Comedy',
    instructions: 'Describe your current environment out loud for 60 seconds. Now do it again — but replace every generic word with a specific one. Not "chair" but "Herman Miller Aeron with the cracked armrest." Not "coffee" but "lukewarm Trader Joe\'s medium roast with too much oat milk."',
    purpose: '<strong>Specifics connect; generalities are forgettable.</strong> Mike Myers never said "Pass the ketchup." It was always "Pass the Heinz." A Z-28, a Yugo, a BMW — each tells you about the character.',
    duration: 120,
    prompts: [],
    warmup: false,
    favorite: true
  },
  {
    id: 'initiation-machine',
    name: 'Initiation Machine',
    category: 'Speed & Specificity',

// ── State ──────────────────────────────────────────────────

let currentExercise = null;
let timerInterval = null;
let timerEndTime = null;
let timerDuration = 60;
let timerRemaining = 60;
let timerRunning = false;
let favorites = JSON.parse(localStorage.getItem('improv-favorites') || '[]');
let currentPromptPools = [];
let audioCtx = null;
let continuousMode = false;
let wakeLock = null;

// Apply saved favorites
favorites.forEach(id => {
  const ex = exercises.find(e => e.id === id);
  if (ex) ex.favorite = true;
});

// ── Navigation ─────────────────────────────────────────────

function showView(id) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function goHome() {
  stopTimer();
  if (continuousMode) toggleContinuous();
  showView('view-home');
}

// ── Random Exercise ────────────────────────────────────────

function randomExercise() {
  // Weight favorites 3x
  const pool = [];
  exercises.forEach(ex => {
    pool.push(ex);
    if (ex.favorite) { pool.push(ex); pool.push(ex); }
  });
  // Avoid repeating same exercise
  let pick;
  let attempts = 0;
  do {
    pick = pool[Math.floor(Math.random() * pool.length)];
    attempts++;
  } while (pick === currentExercise && exercises.length > 1 && attempts < 20);
  showExercise(pick);
}

// ── Show Exercise ──────────────────────────────────────────

function showExercise(ex) {
  currentExercise = ex;
  stopTimer();

  document.getElementById('ex-header-title').textContent = '';
  document.getElementById('ex-name').textContent = ex.name;
  document.getElementById('ex-source').textContent = ex.source;
  document.getElementById('ex-category').textContent = ex.category;
  document.getElementById('ex-instructions').textContent = ex.instructions;
  document.getElementById('ex-purpose').innerHTML = ex.purpose;

  // Favorite star
  updateStarButton();

  // Timer default
  timerDuration = ex.duration || 60;
  timerRemaining = timerDuration;
  updateTimerDisplay();
  updatePresetButtons();

  // Prompts
  const promptSection = document.getElementById('prompt-section');
  if (ex.prompts && ex.prompts.length > 0) {
    promptSection.style.display = 'block';
    document.getElementById('prompt-label').textContent = ex.promptLabel || 'Prompt';
    currentPromptPools = ex.prompts;
    newPrompt();
  } else {
    promptSection.style.display = 'none';
    currentPromptPools = [];
  }

  // Scroll: in continuous mode, jump to prompt/timer area. Otherwise top.
  if (continuousMode) {
    const target = (ex.prompts && ex.prompts.length > 0)
      ? document.getElementById('prompt-section')
      : document.querySelector('.timer-section');
    setTimeout(() => target.scrollIntoView({ behavior: 'smooth', block: 'start' }), 50);
  } else {
    document.getElementById('exercise-scroll').scrollTop = 0;
  }

  showView('view-exercise');

  // Animate
  document.getElementById('ex-name').classList.remove('animate-in');
  void document.getElementById('ex-name').offsetWidth;
  document.getElementById('ex-name').classList.add('animate-in');
}

// ── Prompts ────────────────────────────────────────────────

function newPrompt() {
  if (currentPromptPools.length === 0) return;

  let parts = [];
  currentPromptPools.forEach(poolName => {
    const pool = prompts[poolName];
    if (pool) {
      parts.push(pool[Math.floor(Math.random() * pool.length)]);
    }
  });

  const val = document.getElementById('prompt-value');
  val.textContent = parts.join('  /  ');
  val.classList.remove('prompt-pop');
  void val.offsetWidth;
  val.classList.add('prompt-pop');
}

// ── Favorites ──────────────────────────────────────────────

function toggleFavorite() {
  if (!currentExercise) return;
  currentExercise.favorite = !currentExercise.favorite;

  if (currentExercise.favorite) {
    if (!favorites.includes(currentExercise.id)) favorites.push(currentExercise.id);
  } else {
    favorites = favorites.filter(id => id !== currentExercise.id);
  }
  localStorage.setItem('improv-favorites', JSON.stringify(favorites));
  updateStarButton();
  updateFavCount();
}

function updateStarButton() {
  const btn = document.getElementById('ex-star');
  if (currentExercise && currentExercise.favorite) {
    btn.innerHTML = '&#9733;';
    btn.classList.add('favorited');
  } else {
    btn.innerHTML = '&#9734;';
    btn.classList.remove('favorited');
  }
}

// ── Timer ──────────────────────────────────────────────────

function setTimer(seconds) {
  stopTimer();
  timerDuration = seconds;
  timerRemaining = seconds;
  updateTimerDisplay();
  updatePresetButtons();
}

function updatePresetButtons() {
  document.querySelectorAll('.preset-btn').forEach(btn => {
    btn.classList.remove('selected');
  });
  const presetMap = { 30: 0, 60: 1, 120: 2, 300: 3 };
  const idx = presetMap[timerDuration];
  if (idx !== undefined) {
    document.querySelectorAll('.preset-btn')[idx].classList.add('selected');
  }
}

function toggleTimer() {
  if (timerRunning) {
    stopTimer();
  } else {
    startTimer();
  }
}

function startTimer() {
  if (timerRemaining <= 0) {
    timerRemaining = timerDuration;
  }

  // Ensure audio context is created on user gesture
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }

  timerEndTime = Date.now() + timerRemaining * 1000;
  timerRunning = true;

  const btn = document.getElementById('btn-start');
  btn.textContent = 'Stop';
  btn.classList.remove('start');
  btn.classList.add('stop');

  const display = document.getElementById('timer-display');
  display.classList.add('running');
  display.classList.remove('done');

  timerInterval = setInterval(() => {
    const now = Date.now();
    timerRemaining = Math.max(0, Math.ceil((timerEndTime - now) / 1000));
    updateTimerDisplay();

    if (timerRemaining <= 0) {
      stopTimer();
      playChime();
      if (continuousMode) {
        display.classList.remove('running');
        setTimeout(() => continuousAdvance(), 1500);
      } else {
        display.classList.add('done');
      }
    }
  }, 100);
}

function stopTimer() {
  timerRunning = false;
  if (timerInterval) {
    clearInterval(timerInterval);
    timerInterval = null;
  }
  const btn = document.getElementById('btn-start');
  btn.textContent = 'Start';
  btn.classList.remove('stop');
  btn.classList.add('start');

  document.getElementById('timer-display').classList.remove('running');
}

function resetTimer() {
  stopTimer();
  timerRemaining = timerDuration;
  updateTimerDisplay();
  document.getElementById('timer-display').classList.remove('done');
}

function updateTimerDisplay() {
  const min = Math.floor(timerRemaining / 60);
  const sec = timerRemaining % 60;
  document.getElementById('timer-display').textContent =
    min + ':' + (sec < 10 ? '0' : '') + sec;
}

// ── Audio Chime ────────────────────────────────────────────

function playChime() {
  if (!audioCtx) return;
  const notes = [523.25, 659.25, 783.99]; // C5, E5, G5
  notes.forEach((freq, i) => {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.value = freq;
    const t = audioCtx.currentTime + i * 0.18;
    gain.gain.setValueAtTime(0.25, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 1.0);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start(t);
    osc.stop(t + 1.0);
  });
}

// ── Continuous Mode ────────────────────────────────────────

function toggleContinuous() {
  continuousMode = !continuousMode;
  const btn = document.getElementById('btn-continuous');
  const label = document.getElementById('cont-label');
  if (continuousMode) {
    btn.classList.add('active');
    label.textContent = 'Continuous ON';
    requestWakeLock();
  } else {
    btn.classList.remove('active');
    label.textContent = 'Continuous';
    releaseWakeLock();
  }
}

function continuousAdvance() {
  // Load new random exercise, keep timer duration, auto-start
  const pool = [];
  exercises.forEach(ex => {
    pool.push(ex);
    if (ex.favorite) { pool.push(ex); pool.push(ex); }
  });
  let pick;
  let attempts = 0;
  do {
    pick = pool[Math.floor(Math.random() * pool.length)];
    attempts++;
  } while (pick === currentExercise && exercises.length > 1 && attempts < 20);

  const savedDuration = timerDuration;
  showExercise(pick);
  // Restore the user's chosen duration (not the exercise default)
  timerDuration = savedDuration;
  timerRemaining = savedDuration;
  updateTimerDisplay();
  updatePresetButtons();
  // Auto-start after a beat
  setTimeout(() => startTimer(), 600);
}

// ── Wake Lock (keep screen on) ────────────────────────────

async function requestWakeLock() {
  if ('wakeLock' in navigator) {
    try {
      wakeLock = await navigator.wakeLock.request('screen');
    } catch (e) {}
  }
}

function releaseWakeLock() {
  if (wakeLock) {
    wakeLock.release();
    wakeLock = null;
  }
}

// Re-acquire wake lock when page becomes visible again
document.addEventListener('visibilitychange', () => {
  if (!document.hidden && continuousMode) {
    requestWakeLock();
  }
});

// ── Favorites View ─────────────────────────────────────────

function showFavorites() {
  const list = document.getElementById('favorites-list');
  const empty = document.getElementById('favorites-empty');
  list.innerHTML = '';

  const favs = exercises.filter(ex => ex.favorite);

  if (favs.length === 0) {
    list.style.display = 'none';
    empty.style.display = 'flex';
  } else {
    list.style.display = 'block';
    empty.style.display = 'none';

    favs.forEach(ex => {
      const item = document.createElement('div');
      item.className = 'browse-item';
      item.onclick = () => showExercise(ex);
      item.innerHTML =
        '<div class="name">' + ex.name + '</div>' +
        '<div class="source-tag">' + ex.source.split('/')[0].trim() + '</div>' +
        '<div class="fav-indicator">&#9733;</div>';
      list.appendChild(item);
    });
  }

  showView('view-favorites');
}

function updateFavCount() {
  const n = exercises.filter(ex => ex.favorite).length;
  document.getElementById('fav-count').textContent = n === 0 ? 'Star exercises to add them' : n + ' exercise' + (n === 1 ? '' : 's');
}

// ── Browse ─────────────────────────────────────────────────

const categoryOrder = [
  'Warm-up', 'Thinking', 'Killing the Censor', 'Speed & Specificity',
  'Character', 'Physical / Space', 'Scenic', 'Narrative',
  'Status & Character', 'Environment', 'Game & Pattern', 'Emotional Range',
  'Listening & Reaction', 'Solo Scene Work', 'Body & Voice',
  'Observation & Truth', 'Bonus'
];

function showBrowse() {
  const list = document.getElementById('browse-list');
  list.innerHTML = '';

  // Group by category
  const categories = {};
  exercises.forEach(ex => {
    if (!categories[ex.category]) categories[ex.category] = [];
    categories[ex.category].push(ex);
  });

  // Render in defined order
  categoryOrder.forEach(cat => {
    if (!categories[cat]) return;
    const section = document.createElement('div');
    section.className = 'browse-category';

    const header = document.createElement('div');
    header.className = 'browse-category-header';
    header.textContent = cat + ' (' + categories[cat].length + ')';
    section.appendChild(header);

    categories[cat].forEach(ex => {
      const item = document.createElement('div');
      item.className = 'browse-item';
      item.onclick = () => showExercise(ex);
      item.innerHTML =
        '<div class="name">' + ex.name + '</div>' +
        '<div class="source-tag">' + ex.source.split('/')[0].trim() + '</div>' +
        (ex.favorite ? '<div class="fav-indicator">&#9733;</div>' : '');
      section.appendChild(item);
    });

    list.appendChild(section);
  });

  showView('view-browse');
}

// ── Visibility API (fix timer drift on screen lock) ───────

document.addEventListener('visibilitychange', () => {
  if (!document.hidden && timerRunning && timerEndTime) {
    const now = Date.now();
    timerRemaining = Math.max(0, Math.ceil((timerEndTime - now) / 1000));
    updateTimerDisplay();
    if (timerRemaining <= 0) {
      stopTimer();
      playChime();
      document.getElementById('timer-display').classList.add('done');
    }
  }
});

// ── Service Worker (offline support) ──────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js');
}

// ── Init ───────────────────────────────────────────────────
updateTimerDisplay();
updateFavCount();
